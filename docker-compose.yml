services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecomshop-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: ecomshop
      DB_USERNAME: ecomshop
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ecomshop

  nginx:
    image: nginx:1.27-alpine
    container_name: ecomshop-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ecomshop

  pgsql:
    image: postgres:16-alpine
    container_name: ecomshop-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecomshop
      POSTGRES_USER: ecomshop
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomshop -d ecomshop"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecomshop

  redis:
    image: redis:7-alpine
    container_name: ecomshop-redis
    restart: unless-stopped
    networks:
      - ecomshop

networks:
  ecomshop:
    driver: bridge

volumes:
  pgsql-data:
