; Docker local — revalidate so PHP file changes apply without container restart.
; validate_timestamps=0 is faster on Windows bind mounts but hides code updates from FPM.
; Restart app container after changing this file: docker compose restart app
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.interned_strings_buffer=16
